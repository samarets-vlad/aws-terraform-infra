name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Format, Init (no backend), Validate, TFLint
  # No AWS credentials required — runs completely free
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.0

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.51.0

      - name: Init TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: tflint --recursive --format compact

  # ---------------------------------------------------------------------------
  # Job 2: Security scan with tfsec
  # No AWS credentials required — static analysis only
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan (tfsec)
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false

  # ---------------------------------------------------------------------------
  # NOTE: terraform plan and terraform apply are intentionally NOT in CI.
  # Run them locally when you actually want to deploy:
  #
  #   terraform init
  #   terraform plan -out=tfplan
  #   terraform apply tfplan
  # ---------------------------------------------------------------------------
